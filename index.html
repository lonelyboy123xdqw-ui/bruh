<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAUTY // TRUECOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,900&family=Plus+Jakarta+Sans:wght@200;600&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 4K CINEMATIC INTRO --- */
        #loader-stage {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #flash-mask {
            position: fixed;
            inset: 0;
            background: #fff;
            opacity: 0;
            z-index: 10001;
            pointer-events: none;
        }

        #tauty-zoom {
            position: fixed;
            z-index: 10002;
            font-family: 'Bodoni Moda', serif;
            font-size: 10vw;
            font-style: italic;
            font-weight: 900;
            opacity: 0;
            transform: scale(0.1);
            letter-spacing: -0.05em;
        }

        /* --- INTERIOR --- */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .content-layer {
            position: relative;
            z-index: 10;
            opacity: 0; /* Revealed after zoom */
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .reveal-item { opacity: 0; transform: translateY(30px); }

        .serif-italic { font-family: 'Bodoni Moda', serif; font-style: italic; }

        .btn-main {
            padding: 12px 35px;
            background: #fff;
            color: #000;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .btn-main:hover { transform: scale(1.1); background: #f0f0f0; }
    </style>
</head>
<body>

    <!-- INTRO STAGE -->
    <div id="loader-stage">
        <div id="intro-canvas-container"></div>
    </div>
    <div id="flash-mask"></div>
    <h1 id="tauty-zoom">TAUTY</h1>

    <!-- MAIN WEBSITE -->
    <div id="canvas-bg"></div>

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-between items-center glass-header content-layer">
        <div class="serif-italic text-2xl">T.</div>
        <div class="hidden md:flex gap-10 text-[10px] font-semibold uppercase tracking-[0.4em] opacity-40">
            <a href="#">Gallery</a>
            <a href="#">Discovery</a>
            <a href="#">Truecom</a>
        </div>
        <button class="text-[10px] font-bold border border-white/20 px-5 py-1 hover:bg-white hover:text-black transition">ENTER</button>
    </nav>

    <main class="content-layer">
        <section class="h-screen flex flex-col justify-center items-center text-center px-6">
            <h1 class="serif-italic text-7xl md:text-[10rem] leading-none mb-8 reveal-item">
                Pure <br> Connection.
            </h1>
            <p class="max-w-md text-xs uppercase tracking-[0.4em] opacity-30 leading-loose reveal-item">
                Tauty // Truecom <br> The digital ritual of finding your tribe.
            </p>
            <div class="mt-12 reveal-item">
                <button class="btn-main">Start Exploring</button>
            </div>
        </section>

        <section class="min-h-screen py-40 flex items-center justify-center">
            <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-10 px-6">
                <div class="p-12 border border-white/5 bg-white/[0.02] backdrop-blur-xl reveal-item">
                    <h3 class="serif-italic text-5xl mb-6">Tauty</h3>
                    <p class="text-sm opacity-40 leading-relaxed font-light">Browse the visual collective. Find the match through aesthetics and interests.</p>
                </div>
                <div class="p-12 border border-white/5 bg-white/[0.02] backdrop-blur-xl reveal-item">
                    <h3 class="serif-italic text-5xl mb-6">Truecom</h3>
                    <p class="text-sm opacity-40 leading-relaxed font-light text-blue-100">The inner circle. Private dialogue for those who move past the surface.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- 1. THREE.JS SCENE SETUP (Optimized) ---
        let scene, camera, renderer, orbs = [], mainParticles;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('intro-canvas-container').appendChild(renderer.domElement);

            // Create 4K Orbs
            const orbGeo = new THREE.SphereGeometry(0.4, 64, 64);
            const mat1 = new THREE.MeshBasicMaterial({ color: 0xff3e81 });
            const mat2 = new THREE.MeshBasicMaterial({ color: 0x3e81ff });

            orbs[0] = new THREE.Mesh(orbGeo, mat1);
            orbs[1] = new THREE.Mesh(orbGeo, mat2);
            
            orbs[0].position.x = -8;
            orbs[1].position.x = 8;
            
            scene.add(orbs[0]);
            scene.add(orbs[1]);

            // Background Particles for main site (Optimized)
            const pGeo = new THREE.BufferGeometry();
            const pCount = 1500;
            const pPos = new Float32Array(pCount * 3);
            for(let i=0; i<pCount*3; i++) pPos[i] = (Math.random()-0.5)*15;
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            mainParticles = new THREE.Points(pGeo, new THREE.PointsMaterial({ size: 0.01, color: 0xffffff }));
            
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            mainParticles.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }

        // --- 2. CINEMATIC INTRO TIMELINE ---
        const tl = gsap.timeline();

        window.addEventListener('load', () => {
            // Orbs come in fast
            tl.to(orbs[0].position, { x: -0.6, duration: 1, ease: "power4.in" })
              .to(orbs[1].position, { x: 0.6, duration: 1, ease: "power4.in" }, "-=1")
              
              // Rotate in small circle for 2s
              .to(orbs[0].position, {
                  duration: 2,
                  repeat: 0,
                  ease: "none",
                  onUpdate: function() {
                      const angle = tl.progress() * 25;
                      orbs[0].position.x = Math.cos(angle) * 0.6;
                      orbs[0].position.y = Math.sin(angle) * 0.6;
                      orbs[1].position.x = Math.cos(angle + Math.PI) * 0.6;
                      orbs[1].position.y = Math.sin(angle + Math.PI) * 0.6;
                  }
              })

              // 1s White Flash
              .to("#flash-mask", { opacity: 1, duration: 0.5, ease: "power2.in" })
              .set("#loader-stage", { display: "none" }) // Hide orbs behind flash
              .to("#tauty-zoom", { opacity: 1, scale: 1.2, duration: 0.1 })
              .to("#flash-mask", { opacity: 0, duration: 0.5, ease: "power2.out" })
              
              // Tauty Zoom In Effect
              .to("#tauty-zoom", { scale: 50, opacity: 0, duration: 1, ease: "power4.in" })
              
              // Final Reveal
              .set(".content-layer", { opacity: 1 })
              .to(".reveal-item", { opacity: 1, y: 0, stagger: 0.15, duration: 1, ease: "power3.out" })
              .set("body", { overflowY: "auto" });

            // Move particles to main background
            scene.remove(orbs[0]);
            scene.remove(orbs[1]);
            scene.add(mainParticles);
            document.getElementById('canvas-bg').appendChild(renderer.domElement);
        });

        init();

        // Responsive Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
